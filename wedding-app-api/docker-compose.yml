services:
  db:
    image: postgres:16-alpine
    container_name: wedding_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wedding_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wedding_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
